services:
  - type: web
    name: poultry-egg-finder-web
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:push
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: poultry-egg-finder-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false

databases:
  - name: poultry-egg-finder-db
    plan: free
    databaseName: poultry_egg_finder
    user: poultry_user
    postgresMajorVersion: "16"
